<div [ngClass]="cardClasses" [ngStyle]="borderStyle" style="border: 1px solid #ccc; padding: 15px; border-radius: 5px; width: 250px; margin-bottom: 10px;">
  <h3>{{ course.name }}</h3>
  <p>Code: {{ course.code }}</p>
  <p>Credits: {{ course.credits }}</p>
  
  <div [ngSwitch]="course.gradeStatus">
    <span *ngSwitchCase="'passed'" style="color: green; font-weight: bold;">Passed</span>
    <span *ngSwitchCase="'failed'" style="color: red; font-weight: bold;">Failed</span>
    <span *ngSwitchDefault style="color: grey; font-weight: bold;">Pending</span>
  </div>

  <button (click)="onEnroll()" style="background: #007bff; color: white; border: none; padding: 5px 10px; cursor: pointer; margin-top: 10px;">
    Enroll
  </button>
  <button (click)="toggleDetails()" style="background: #6c757d; color: white; border: none; padding: 5px 10px; cursor: pointer; margin-top: 10px; margin-left: 5px;">
    Show Details
  </button>

  <div *ngIf="isExpanded" style="margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 3px;">
    <p>Full details for {{ course.name }}...</p>
  </div>
</div>
