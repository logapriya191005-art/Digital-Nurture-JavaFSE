<h2>Available Courses</h2>
<p *ngIf="isLoading">Loading courses...</p>

<div *ngIf="!isLoading" style="display: flex; gap: 20px; flex-wrap: wrap;">
  <app-course-card 
    *ngFor="let course of courses; trackBy: trackByCourseId" 
    [course]="course"
    (enrollRequested)="onEnroll($event)">
  </app-course-card>
</div>

<p *ngIf="selectedCourseId" style="margin-top: 20px; font-weight: bold; color: blue;">
  Selected course ID: {{ selectedCourseId }}
</p>
